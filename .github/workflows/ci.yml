name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  integrity:
    name: Integrity
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Verify assets integrity
      run: |
        echo "4b5c8507ff16f7712e28e0f635fd783f2a8ba7c912f82d86223a90f3656a2395  dist/roms/apogee.rom" > SHA256SUMS
        echo "a71d0166f73952675db15088545276cf39805cab34f9c94f28de50931f8ed99f  dist/fonts/sga.bin" >> SHA256SUMS
        echo "262b653bb227ae5544e35e3fa0707dc43f06ebd36f167658683fd65ec239c788  tests/assets/ducks.rka" >> SHA256SUMS
        echo "737b8a71eea220794180748033dca32e01e06e1ce597dddd51f96788a19e4d48  tests/assets/dvigalka.rka" >> SHA256SUMS
        echo "7bed714c5f1975aadf7f47de5b82a6b3a972a6216fd66784187476a86b6b0814  tests/assets/kindzadza.rka" >> SHA256SUMS
        echo "cc553a0c36aca27c4ba1ab27bdeba0073b9332a966bc5f95593c3dc16b66223b  tests/assets/kletavt.rka" >> SHA256SUMS
        echo "95e2edd76cf15ef3bf8e22c1e85a1be9691f0be2ac764d21275e1c0594bdadca  tests/assets/rc.rka" >> SHA256SUMS
        echo "42bc4bc92475d4e84cf1b145d0fcea6d104ec2da421cc6880ea8d14fdfaeae2c  tests/assets/robocop.rka" >> SHA256SUMS
        echo "2f34aa96004ecec170de4e616c2257657d9eee7af9feeb549cf53ebe27e39d1f  tests/assets/tia2.rka" >> SHA256SUMS
        sha256sum --check SHA256SUMS

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
    - name: Run tests
      run: cargo test --verbose
    - name: Run doc-tests
      run: cargo test --doc --verbose

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Install ALSA
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev
    - name: Run clippy
      run: cargo clippy --release -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Generate coverage
      run: cargo llvm-cov --all-features --workspace --codecov --output-path codecov.json
    - name: Upload to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: codecov.json
        fail_ci_if_error: true
